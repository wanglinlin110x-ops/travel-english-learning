<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>旅行常用英语</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-solid: #ffffff;
      --panel-warm: #fafbf7;
      --text: #171a18;
      --muted: #747a72;
      --line: #e2e5df;
      --line-strong: #cdd3ca;
      --focus-ring: rgba(24, 110, 78, 0.18);
      --primary: #186e4e;
      --primary-deep: #124f39;
      --primary-soft: #eaf3ee;
      --accent: #9a6a22;
      --accent-soft: #f5efe3;
      --success: #277456;
      --success-soft: #e8f3ec;
      --warning: #9b651f;
      --warning-soft: #fbefd9;
      --danger: #a74b2b;
      --danger-soft: #fae8df;
      --shadow: 0 1px 2px rgba(23, 26, 24, 0.04);
      --shadow-soft: 0 1px 2px rgba(23, 26, 24, 0.035);
      --shadow-lift: 0 8px 24px rgba(23, 26, 24, 0.06);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --app-shell-width: 390px;
      --primary-titlebar-height: 58px;
      --secondary-titlebar-height: 52px;
      --tabbar-control-height: 52px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    ::selection {
      background: rgba(111, 196, 42, 0.22);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }

    .app {
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    .app.has-tabbar {
      padding-bottom: calc(84px + env(safe-area-inset-bottom));
    }

    .app.home.has-tabbar {
      height: 100svh;
      overflow-y: auto;
      padding-bottom: 0;
      scroll-snap-type: y proximity;
      scroll-behavior: smooth;
    }

    .home-screen {
      min-height: calc(100svh - 70px - env(safe-area-inset-bottom));
      padding: 34px 22px calc(28px + env(safe-area-inset-bottom));
      scroll-snap-align: start;
      display: grid;
      align-content: start;
      gap: 22px;
    }

    .home-primary {
      align-content: space-between;
    }

    .home-secondary {
      position: relative;
      overflow: hidden;
      align-content: stretch;
      padding-top: 26px;
      padding-bottom: calc(104px + env(safe-area-inset-bottom));
    }

    .hero {
      padding: 0;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      min-height: auto;
      border-bottom: 1px solid transparent;
    }

    .hero::after {
      display: none;
    }

    .hero-top {
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
      font-weight: 600;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      max-width: 330px;
      font-size: 42px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 900;
      color: var(--text);
    }

    .stats {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px 8px;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }

    .today-panel {
      display: grid;
      gap: 18px;
    }

    .today-copy {
      display: grid;
      gap: 6px;
    }

    .today-copy h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.18;
      font-weight: 880;
      letter-spacing: 0;
    }

    .today-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .today-progress {
      height: 7px;
      border-radius: 999px;
      background: #e8ece6;
      overflow: hidden;
      margin-top: 14px;
    }

    .today-progress span {
      display: block;
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: var(--primary-deep);
    }

    .today-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      background: var(--primary-deep);
      color: #fff;
      font-weight: 780;
      font-size: 15px;
      margin-top: 16px;
    }

    .scroll-hint {
      display: grid;
      place-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      align-self: end;
      margin-bottom: 4px;
    }

    .scroll-hint::after {
      content: "";
      width: 18px;
      height: 18px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      opacity: 0.72;
    }

    .stat + .stat {
      border-left: 0;
    }

    .stat strong {
      display: block;
      font-size: 30px;
      margin-top: 6px;
      color: var(--primary-deep);
      font-weight: 900;
    }

    .stat span {
      color: var(--text);
      font-size: 13px;
      font-weight: 760;
    }

    .section {
      padding: 20px 22px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
      font-weight: 860;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .scene-card:active,
    .content-card:active,
    .practice-card:active {
      transform: scale(0.992);
    }

    .card-list {
      display: grid;
      gap: 10px;
    }

    .scene-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .scene-showcase {
      min-height: calc(100svh - 70px - env(safe-area-inset-bottom));
      padding: 0;
      color: #fff;
      background: #101614;
      isolation: isolate;
    }

    .scene-showcase::before,
    .scene-showcase::after {
      content: "";
      position: absolute;
      inset: 0;
      transition: background 360ms ease, opacity 360ms ease;
      pointer-events: none;
    }

    .scene-showcase::before {
      z-index: -3;
      background:
        radial-gradient(circle at 70% 22%, rgba(255, 255, 255, 0.32), transparent 18%),
        linear-gradient(135deg, #174d3d, #87a394);
    }

    .scene-showcase::after {
      z-index: -2;
      background:
        linear-gradient(180deg, rgba(8, 12, 10, 0.18), rgba(8, 12, 10, 0.54) 50%, rgba(8, 12, 10, 0.82)),
        linear-gradient(90deg, rgba(7, 13, 11, 0.78), rgba(7, 13, 11, 0.18) 56%, rgba(7, 13, 11, 0.58));
    }

    .scene-showcase.airport::before {
      background:
        radial-gradient(ellipse at 72% 34%, rgba(222, 239, 235, 0.9), transparent 15%),
        radial-gradient(ellipse at 58% 44%, rgba(173, 204, 200, 0.58), transparent 26%),
        linear-gradient(160deg, #183f36 0%, #6f9188 48%, #d4ddd7 100%);
    }

    .scene-showcase.hotel::before {
      background:
        radial-gradient(circle at 70% 28%, rgba(255, 214, 154, 0.82), transparent 13%),
        radial-gradient(ellipse at 54% 46%, rgba(142, 92, 49, 0.64), transparent 28%),
        linear-gradient(145deg, #251d18 0%, #7d5232 50%, #d4aa70 100%);
    }

    .scene-showcase.restaurant::before {
      background:
        radial-gradient(circle at 72% 22%, rgba(255, 232, 186, 0.82), transparent 13%),
        radial-gradient(ellipse at 58% 50%, rgba(191, 98, 36, 0.66), transparent 27%),
        linear-gradient(145deg, #2a1710 0%, #7f3e1f 48%, #d18438 100%);
    }

    .scene-showcase.transport::before {
      background:
        radial-gradient(ellipse at 78% 24%, rgba(206, 227, 221, 0.72), transparent 16%),
        repeating-linear-gradient(100deg, rgba(255,255,255,0.12) 0 2px, transparent 2px 26px),
        linear-gradient(145deg, #121c1b 0%, #384b4d 52%, #95aaa3 100%);
    }

    .scene-showcase.shopping::before {
      background:
        radial-gradient(circle at 76% 26%, rgba(255, 220, 214, 0.78), transparent 14%),
        radial-gradient(ellipse at 58% 48%, rgba(177, 72, 64, 0.64), transparent 28%),
        linear-gradient(145deg, #291918 0%, #7f3835 48%, #d29086 100%);
    }

    .scene-showcase-photo {
      position: absolute;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .scene-showcase-photo::before,
    .scene-showcase-photo::after {
      content: "";
      position: absolute;
      opacity: 0.55;
      filter: blur(0.2px);
      transition: transform 360ms ease, opacity 360ms ease;
    }

    .scene-showcase-photo::before {
      right: -44px;
      top: 16%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        -78px 54px 0 rgba(255,255,255,0.08),
        -132px 118px 0 rgba(255,255,255,0.05);
    }

    .scene-showcase-photo::after {
      left: 30%;
      right: 0;
      bottom: 18%;
      height: 34%;
      border-radius: 999px 0 0 999px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.16) 0 1px, transparent 1px 22px);
      transform: skewY(-7deg);
    }

    .scene-showcase-content {
      position: relative;
      z-index: 1;
      min-height: inherit;
      display: grid;
      align-content: end;
      gap: 18px;
      padding: 36px 24px calc(116px + env(safe-area-inset-bottom));
    }

    .scene-showcase-copy {
      max-width: 300px;
      margin-left: auto;
      display: grid;
      gap: 12px;
      text-align: left;
    }

    .scene-showcase-copy > .pill {
      width: fit-content;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .scene-showcase-copy h2 {
      margin: 0;
      font-size: 43px;
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 920;
      color: #fff;
    }

    .scene-showcase-copy p {
      margin: 0;
      max-width: 250px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.48;
    }

    .scene-showcase-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .scene-showcase-meta span {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 12px;
      line-height: 1.2;
      backdrop-filter: blur(10px);
    }

    .scene-showcase-cta {
      width: fit-content;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      padding: 0 18px;
      color: #101614;
      background: rgba(255, 255, 255, 0.9);
      font-weight: 830;
    }

    .scene-tabs-vertical {
      position: absolute;
      left: 20px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      z-index: 2;
      display: grid;
      gap: 8px;
      width: 112px;
    }

    .scene-tab {
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 8px 12px;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.08);
      text-align: left;
      font-weight: 760;
      backdrop-filter: blur(12px);
      transition: background 180ms ease, color 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .scene-tab.active {
      color: #101614;
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(255, 255, 255, 0.78);
      transform: translateX(6px);
    }

    .scene-card,
    .content-card,
    .practice-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius-md);
      padding: 15px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .scene-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      text-align: left;
      width: 100%;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .scene-card.compact {
      align-items: center;
    }

    .course-directory {
      display: grid;
      gap: 8px;
    }

    .course-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      color: var(--text);
      text-align: left;
      box-shadow: var(--shadow-soft);
    }

    .course-row h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 840;
    }

    .course-row p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .course-row-main {
      min-width: 0;
    }

    .course-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .course-progress {
      height: 5px;
      margin-top: 9px;
      border-radius: 999px;
      background: #e8ece6;
      overflow: hidden;
    }

    .course-progress span {
      display: block;
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: var(--primary-deep);
    }

    .course-row-action {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 12px;
      background: var(--panel-warm);
      color: var(--primary-deep);
      font-size: 13px;
      font-weight: 780;
      white-space: nowrap;
    }

    .scene-tile {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      min-height: 92px;
      text-align: left;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel);
      padding: 16px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .scene-tile:active {
      transform: scale(0.992);
    }

    .scene-tile h3 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 860;
    }

    .scene-tile span:last-child {
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
    }

    .module-card {
      grid-template-columns: auto 1fr auto;
      align-items: center;
    }

    .learn-block {
      display: grid;
      gap: 12px;
    }

    .practice-grid {
      display: grid;
      gap: 10px;
    }

    .practice-entry {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 92px;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px;
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }

    .practice-entry.featured-chat {
      min-height: 118px;
      align-items: end;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      color: #fff;
      border: 0;
      border-radius: 24px;
      background: #14291f;
    }

    .practice-entry.featured-chat::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 78% 22%, rgba(255,255,255,0.32), transparent 19%),
        linear-gradient(135deg, #124f39, #26302c);
    }

    .practice-entry.featured-chat::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(90deg, rgba(7, 15, 12, 0.72), rgba(7, 15, 12, 0.18) 62%, rgba(7, 15, 12, 0.46));
    }

    .practice-entry h3 {
      margin: 0 0 4px;
      font-size: 17px;
      font-weight: 840;
    }

    .practice-entry p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .practice-entry.featured-chat p,
    .practice-entry.featured-chat .pill {
      color: rgba(255, 255, 255, 0.78);
    }

    .practice-entry.featured-chat .pill {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .practice-entry .scene-card-art {
      position: absolute;
      right: 18px;
      bottom: 14px;
      width: 98px;
      height: 98px;
      color: rgba(255, 255, 255, 0.42);
    }

    .practice-entry .scene-card-art svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .practice-entry-content {
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .app.learn {
      width: min(100%, 390px);
      min-height: 100svh;
      overflow-x: hidden;
      background: #ffffff;
      color: #151c27;
    }

    .learn-titlebar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      background: #ffffff;
      border-bottom: 1px solid rgba(21, 28, 39, 0.08);
    }

    .learn-titlebar h1 {
      margin: 0;
      color: #151c27;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 800;
    }

    .learn-titlebar span {
      color: rgba(21, 28, 39, 0.58);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 650;
    }

    .learn-content {
      padding-bottom: 12px;
      background: #ffffff;
    }

    .app.learn .section {
      padding: 22px 20px 4px;
    }

    .app.learn .section-title {
      margin-bottom: 13px;
    }

    .app.learn .section-title h2 {
      color: #151c27;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 780;
    }

    .app.learn .section-title span {
      color: rgba(21, 28, 39, 0.54);
      font-size: 12px;
      font-weight: 600;
    }

    .app.learn .course-directory {
      gap: 10px;
    }

    .app.learn .course-row {
      --course-accent: #70ad37;
      grid-template-columns: 42px minmax(0, 1fr) 34px;
      gap: 12px;
      min-height: 94px;
      padding: 14px;
      border: 1px solid #e5ecdf;
      border-radius: 12px;
      background: #f5f9ef;
      box-shadow: none;
    }

    .app.learn .course-row.tone-blue {
      --course-accent: #4e70ad;
      border-color: #e1e7f2;
      background: #f1f4fc;
    }

    .course-row-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      align-self: start;
      border-radius: 50%;
      color: #195200;
      background: rgba(255, 255, 255, 0.82);
    }

    .course-row.tone-blue .course-row-mark {
      color: #2852a0;
    }

    .course-row-mark svg,
    .course-row-action svg,
    .learn-chat-card svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .app.learn .course-row-top h3 {
      color: #151c27;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 780;
    }

    .course-row-percent {
      color: var(--course-accent);
      font-size: 13px;
      line-height: 1;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .app.learn .course-row p {
      margin-top: 5px;
      color: rgba(21, 28, 39, 0.58);
      font-size: 12px;
    }

    .app.learn .course-progress {
      height: 4px;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.92);
    }

    .app.learn .course-progress span {
      background: var(--course-accent);
    }

    .app.learn .course-row-action {
      width: 34px;
      height: 34px;
      min-height: 0;
      display: grid;
      place-items: center;
      align-self: center;
      border: 1px solid rgba(21, 28, 39, 0.08);
      border-radius: 50%;
      padding: 0;
      color: #151c27;
      background: rgba(255, 255, 255, 0.84);
    }

    .app.learn .practice-grid {

    function pushUniqueEntries(list, entries, englishIndex) {
      const seen = new Set(list.map(item => normalizeEnglish(item[englishIndex])));
      for (const entry of entries) {
        const key = normalizeEnglish(entry[englishIndex]);
        if (!seen.has(key)) {
          list.push(entry);
          seen.add(key);
        }
      }
    }

    function replaceEntryByEnglish(list, currentEnglish, nextEntry, englishIndex) {
      const target = normalizeEnglish(currentEnglish);
      const index = list.findIndex(item => normalizeEnglish(item[englishIndex]) === target);
      if (index >= 0) {
        list[index] = nextEntry;
        return true;

      return false;

        ].forEach(([list, englishIndex]) => {
          const seen = new Set();
          for (let index = list.length - 1; index >= 0; index--) {
            const key = normalizeEnglish(list[index][englishIndex]);
            if (seen.has(key)) {
              list.splice(index, 1);

          }
        });

    function loadProgress() {
      const fallback = {
        progressVersion: PROGRESS_VERSION,
        completedSceneIds: [],
        learnedVocabIds: [],
        learnedPhraseIds: [],
        spokenPhraseIds: [],
        completedListeningIds: [],
        completedChatIds: [],

        wrongQuestionIds: [],
        lastSceneId: "",
        lastModule: "vocabulary"
      };
      try {
        const stored = JSON.parse(localStorage.getItem("travelEnglishProgress") || "{}");
        if (stored.progressVersion !== PROGRESS_VERSION) {
          return sanitizeProgress({
            ...fallback,
            favoriteIds: Array.isArray(stored.favoriteIds) ? stored.favoriteIds : [],
            wrongQuestionIds: Array.isArray(stored.wrongQuestionIds) ? stored.wrongQuestionIds : [],
            lastSceneId: stored.lastSceneId || "",
            lastModule: stored.lastModule || "vocabulary"
          });
        }
        return sanitizeProgress({ ...fallback, ...stored, progressVersion: PROGRESS_VERSION });
      } catch {
        return fallback;
      }
    }

    function sanitizeProgress(progress) {
      const validIds = {
        learnedVocabIds: new Set(),
        learnedPhraseIds: new Set(),
        spokenPhraseIds: new Set(),
        completedListeningIds: new Set(),
        completedChatIds: new Set(),
        favoriteIds: new Set(),
        wrongQuestionIds: new Set()
      };

      for (const scene of SCENES) {
        scene.vocab.forEach((_, index) => {
          const id = vocabId(scene, index);
          validIds.learnedVocabIds.add(id);
          validIds.favoriteIds.add(id);
        });
        scene.phrases.forEach((_, index) => {
          const id = phraseId(scene, index);
          validIds.learnedPhraseIds.add(id);
          validIds.spokenPhraseIds.add(id);
          validIds.favoriteIds.add(id);
        });
        scene.listening.forEach((_, index) => {
          const id = listeningId(scene, index);
          validIds.completedListeningIds.add(id);
          validIds.wrongQuestionIds.add(id);
        });
        validIds.completedChatIds.add(chatId(scene));
      }

      Object.keys(validIds).forEach(key => {
        progress[key] = Array.isArray(progress[key])
          ? progress[key].filter(id => validIds[key].has(id))
          : [];
      });
      if (!SCENES.some(scene => scene.id === progress.lastSceneId)) {
        progress.lastSceneId = "";
      }
      return progress;
    }

    function saveProgress() {
      localStorage.setItem("travelEnglishProgress", JSON.stringify(state.progress));

    function sceneById(id) {
      return SCENES.find(scene => scene.id === id) || SCENES[0];
    }

    function isCoreScene(sceneOrId) {
      const id = typeof sceneOrId === "string" ? sceneOrId : sceneOrId.id;
      return CORE_SCENE_IDS.includes(id);
    }

    function coreScenes() {
      return CORE_SCENE_IDS.map(sceneById).filter(Boolean);
    }

    function lastCoreScene() {
      return state.progress.lastSceneId && isCoreScene(state.progress.lastSceneId)
        ? sceneById(state.progress.lastSceneId)
        : coreScenes()[0];
    }

    function contentIndexes(scene, type) {
      const total = type === "vocabulary"
        ? scene.vocab.length
        : type === "listening"
          ? scene.listening.length
          : type === "phrases" || type === "speaking"
            ? scene.phrases.length
            : 0;
      const indexes = Array.from({ length: total }, (_, index) => index);
      const limit = MAIN_CONTENT_LIMITS[type];
      return isCoreScene(scene) && limit ? indexes.slice(0, limit) : indexes;
    }

    function contentCount(scene, type) {
      return contentIndexes(scene, type).length;
    }

    function coreChatTurns(scene) {
      return isCoreScene(scene) ? scene.chat.slice(0, CHAT_TURN_LIMIT) : scene.chat;
    }

    function globalChatTurns() {
      const scenes = coreScenes();
      const turns = [];
      for (let turnIndex = 0; turnIndex < CHAT_TURN_LIMIT; turnIndex += 1) {
        scenes.forEach(scene => {
          const turn = coreChatTurns(scene)[turnIndex];
          if (turn) turns.push({ sceneId: scene.id, turn });
        });
      }
      return turns.slice(0, 12);
    }

    function coreProgressCount(progressKey, type) {
      const ids = coreScenes().flatMap(scene => idsFor(scene, type));
      return ids.filter(id => state.progress[progressKey].includes(id)).length;
    }

      return `${scene.id}_phrase_${index}`;

      return `${scene.id}_vocab_${index}`;

    function setView(view, options = {}, config = {}) {
      const topViews = ["home", "learn", "favorites"];
      const fromView = state.view;
      if (fromView === "home" && app) {
        state.homeScrollTop = app.scrollTop || 0;
      }
      if (topViews.includes(state.view) && !topViews.includes(view)) {
        state.returnView = state.view;
      }
      if (view === "vocabDetail") {
        state.detailReturnView = state.view === "vocabStudy" ? "vocabStudy" : "scene";
      }
      const target = {
        view,
        sceneId: options.sceneId || state.sceneId,
        module: options.module || state.module,
        vocabIndex: options.vocabIndex ?? state.vocabIndex
      };
      state.view = view;
      Object.assign(state, options);
      if (topViews.includes(view)) {
        state.returnView = view;
      }
      if (options.sceneId) {
        state.progress.lastSceneId = options.sceneId;
        state.progress.lastModule = options.module || state.progress.lastModule || "vocabulary";
        saveProgress();
      }
      render();
      if (app) {
        app.scrollTop = view === "home" ? state.homeScrollTop : 0;
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack() {
      if (state.view === "vocabDetail") {
        if (state.detailReturnView === "vocabStudy") {
          setView("vocabStudy", { sceneId: state.sceneId, module: "vocabulary", vocabIndex: state.vocabIndex }, { replace: true });
        } else {
          setView("scene", { sceneId: state.sceneId, module: "vocabulary" }, { replace: true });
        }
        return;
      }
      if (state.view === "vocabStudy") {
        if (state.vocabStudyEntry === "daily") {
          state.showVocabExitConfirm = true;
          render();
          return;
        }
        setView("scene", { sceneId: state.sceneId, module: "vocabulary" }, { replace: true });
        return;
      }
      if (state.view === "scene") {
        setView(state.returnView || "learn", {}, { replace: true });
        return;
      }
      if (state.view === "globalChat") {
        setView("learn", {}, { replace: true });
        return;
      }
      setView("home", {}, { replace: true });
    }

    const SPEECH_RATE_NORMAL = 0.95;
    const SPEECH_RATE_SLOW = 0.55;

    function preferredEnglishVoice() {
      if (!window.speechSynthesis?.getVoices) return null;
      const voices = window.speechSynthesis.getVoices();
      const englishVoices = voices.filter(voice => /^en[-_]/i.test(voice.lang));
      return englishVoices.find(voice => /samantha|alex|google us english|microsoft aria|natural/i.test(voice.name)) ||
        englishVoices.find(voice => /^en[-_]US/i.test(voice.lang)) ||
        englishVoices[0] ||
        null;
    }

    function speak(text, rate = SPEECH_RATE_NORMAL, options = {}) {
      if (!("speechSynthesis" in window)) {
        if (!options.silent) {
          showNoticeDialog("暂时无法播放语音", "当前浏览器不支持语音播放，可以先阅读英文文本进行练习。");
        }
        return false;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = rate <= 0.8 ? SPEECH_RATE_SLOW : SPEECH_RATE_NORMAL;
      utterance.pitch = 1;
      utterance.volume = 1;
      const voice = preferredEnglishVoice();
      if (voice) utterance.voice = voice;
      window.speechSynthesis.speak(utterance);
      return true;
    }

    function normalizeEnglish(text) {
      return String(text)
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function meaningfulTokens(text) {
      const stopWords = new Set(["a", "an", "the", "to", "is", "are", "am", "i", "you", "it", "this", "that", "do", "does", "can", "could", "would", "please", "here", "there"]);
      return normalizeEnglish(text).split(" ").filter(token => token && !stopWords.has(token));
    }

    function answerScore(input, expected) {
      const inputNorm = normalizeEnglish(input);
      const expectedNorm = normalizeEnglish(expected);
      if (!inputNorm) return 0;
      if (inputNorm === expectedNorm) return 1;
      if (inputNorm.includes(expectedNorm) || expectedNorm.includes(inputNorm)) return 0.85;
      const expectedTokens = meaningfulTokens(expected);
      if (!expectedTokens.length) return 0;
      const inputTokens = new Set(meaningfulTokens(input));
      const matched = expectedTokens.filter(token => inputTokens.has(token)).length;
      return matched / expectedTokens.length;
    }

    function canUseSpeechRecognition() {
      return window.SpeechRecognition || window.webkitSpeechRecognition;
    }

    function startPronunciationCheck(targetText, feedbackId) {
      if (state.activeRecognitionId) {
        state.speechFeedback[feedbackId] = {
          type: "warn",
          text: "正在进行另一条发音检测，请等它结束后再试。"
        };
        render();
        return;
      }
      const Recognition = canUseSpeechRecognition();
      if (!Recognition) {
        state.speechFeedback[feedbackId] = {
          type: "warn",
          text: "当前浏览器不支持语音识别。可以先听标准发音，再用“标记掌握 / 我读完了”记录练习。"
        };
        render();
        return;
      }

      const recognition = new Recognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      state.activeRecognitionId = feedbackId;
      state.speechFeedback[feedbackId] = { type: "", text: "正在听你说，请读出上面的英文。" };
      render();

      recognition.onresult = event => {
        state.activeRecognitionId = "";
        const transcript = event.results[0][0].transcript;
        const score = answerScore(transcript, targetText);
        const good = score >= 0.6;
        state.speechFeedback[feedbackId] = {
          type: good ? "good" : "warn",
          text: `${good ? "发音识别通过。需要计入进度时，请手动点击标记按钮。" : "识别不够接近，可以再听一遍慢速发音。"} 识别结果：${transcript}`
        };
        render();
      };

      recognition.onerror = () => {
        state.activeRecognitionId = "";
        state.speechFeedback[feedbackId] = {
          type: "warn",
          text: "没有完成识别。请检查麦克风权限，或用手动按钮记录练习。"
        };
        render();
      };

      try {
        recognition.start();
      } catch {
        state.activeRecognitionId = "";
        state.speechFeedback[feedbackId] = {
          type: "warn",
          text: "发音检测没有启动成功。可以刷新页面后再试，或先用手动按钮记录练习。"
        };
        render();
      }
    }

    function speechFeedbackHtml(id) {
      const feedback = state.speechFeedback[id];
      if (!feedback) return "";
      return `<div class="speech-result ${feedback.type}">${feedback.text}</div>`;

    function toggleFavorite(id) {
      const list = state.progress.favoriteIds;
      if (list.includes(id)) {

    function addUnique(key, id) {
      if (!state.progress[key].includes(id)) {
        state.progress[key].push(id);
        saveProgress();
      }
    }

    function toggleProgressItem(key, id) {
      if (state.progress[key].includes(id)) {
        state.progress[key] = state.progress[key].filter(item => item !== id);
      } else {

    function idsFor(scene, type) {
      if (type === "vocabulary") return contentIndexes(scene, "vocabulary").map(index => vocabId(scene, index));
      if (type === "phrases") return contentIndexes(scene, "phrases").map(index => phraseId(scene, index));
      if (type === "listening") return contentIndexes(scene, "listening").map(index => listeningId(scene, index));
      if (type === "speaking") return contentIndexes(scene, "speaking").map(index => phraseId(scene, index));
      if (type === "chat") return [chatId(scene)];
      return [];
    }

    function moduleCompleted(scene, moduleName) {
      if (moduleName === "vocabulary") return idsFor(scene, "vocabulary").every(id => state.progress.learnedVocabIds.includes(id));
      if (moduleName === "phrases") return idsFor(scene, "phrases").every(id => state.progress.learnedPhraseIds.includes(id));
      if (moduleName === "listening") return idsFor(scene, "listening").every(id => state.progress.completedListeningIds.includes(id));
      if (moduleName === "speaking") return idsFor(scene, "speaking").every(id => state.progress.spokenPhraseIds.includes(id));
      if (moduleName === "chat") return state.progress.completedChatIds.includes(chatId(scene));
      return false;
    }

    function completionRatio(scene, moduleName) {
      const ids = idsFor(scene, moduleName);
      if (!ids.length) return 0;
      if (moduleName === "vocabulary") return ids.filter(id => state.progress.learnedVocabIds.includes(id)).length / ids.length;
      if (moduleName === "phrases") return ids.filter(id => state.progress.learnedPhraseIds.includes(id)).length / ids.length;
      if (moduleName === "listening") return ids.filter(id => state.progress.completedListeningIds.includes(id)).length / ids.length;
      if (moduleName === "speaking") return ids.filter(id => state.progress.spokenPhraseIds.includes(id)).length / ids.length;
      if (moduleName === "chat") return state.progress.completedChatIds.includes(chatId(scene)) ? 1 : 0;
      return 0;
    }

    function moduleProgress(scene) {
      const modules = ["vocabulary", "phrases", "listening", "speaking", "chat"];
      const ratio = modules.reduce((total, moduleName) => total + completionRatio(scene, moduleName), 0) / modules.length;
      return Math.round(ratio * 100);
    }

    function nextCourseModule(scene) {
      const modules = [
        ["vocabulary", "词汇"],
        ["phrases", "短句"],
        ["listening", "听力"],
        ["speaking", "跟读"],
        ["chat", "对话"]
      ];
      const next = modules.find(([id]) => !moduleCompleted(scene, id)) || modules[0];
      return { id: next[0], label: next[1] };
    }

    function completedSceneCount() {
      return coreScenes().filter(scene => moduleProgress(scene) === 100).length;
    }

    function markVocabLearned(sceneId, index) {
      toggleProgressItem("learnedVocabIds", vocabId(sceneById(sceneId), index));
      render();
    }

    function orderedVocabIndexes(scene) {
      return contentIndexes(scene, "vocabulary")
        .sort((a, b) => {
          const difficultyA = a < 10 ? 0 : a < 20 ? 1 : 2;
          const difficultyB = b < 10 ? 0 : b < 20 ? 1 : 2;
          return difficultyA - difficultyB || a - b;
        });
    }

    function firstUnlearnedVocabIndex(scene) {
      const order = orderedVocabIndexes(scene);
      return order.find(index => !state.progress.learnedVocabIds.includes(vocabId(scene, index))) ?? order[0] ?? 0;
    }

    function nextVocabIndex(scene, currentIndex) {
      const order = orderedVocabIndexes(scene);
      const currentPosition = Math.max(order.indexOf(currentIndex), 0);
      return order[currentPosition + 1] ?? -1;
    }

    function vocabStudyPosition(scene, index) {
      const order = orderedVocabIndexes(scene);
      return Math.max(order.indexOf(index), 0) + 1;
    }

      state.vocabStudyAutoPlayKey = "";
      setView("vocabStudy", {
        sceneId,
        module: "vocabulary",
        vocabIndex: firstUnlearnedVocabIndex(scene)

    function skipStudyVocab() {
      const scene = sceneById(state.sceneId);
      const nextIndex = nextVocabIndex(scene, state.vocabIndex);
      if (nextIndex < 0) {
        state.vocabStudyDone = true;
      } else {
        state.vocabIndex = nextIndex;
        state.vocabStudyDone = false;
      }
      render();
    }

    function previousStudyVocab() {
      const scene = sceneById(state.sceneId);
      const order = orderedVocabIndexes(scene);
      const currentPosition = order.indexOf(state.vocabIndex);
      if (currentPosition > 0) {
        state.vocabIndex = order[currentPosition - 1];
        state.vocabStudyDone = false;
      }
      render();
    }

    function masterStudyVocab() {
      const scene = sceneById(state.sceneId);
      const id = vocabId(scene, state.vocabIndex);
      if (state.progress.learnedVocabIds.includes(id)) {
        removeItem("learnedVocabIds", id);
        state.vocabStudyDone = false;

    function scheduleVocabStudyAutoPlay() {
      if (state.view !== "vocabStudy" || state.vocabStudyDone) return;
      const scene = sceneById(state.sceneId);
      const order = orderedVocabIndexes(scene);
      const requestedIndex = Math.min(Math.max(Number(state.vocabIndex) || 0, 0), scene.vocab.length - 1);
      const index = order.includes(requestedIndex) ? requestedIndex : firstUnlearnedVocabIndex(scene);
      if (index < 0 || !scene.vocab[index]) return;
      const key = vocabId(scene, index);
      if (state.vocabStudyAutoPlayKey === key) return;
      state.vocabStudyAutoPlayKey = key;
      window.setTimeout(() => {
        if (state.view !== "vocabStudy" || state.vocabStudyDone || state.vocabStudyAutoPlayKey !== key) return;
        speak(scene.vocab[index][0], SPEECH_RATE_NORMAL, { silent: true });
      }, 180);
    }

    function relatedPhrasesForVocab(scene, vocabItem, vocabIndex) {
      const tokens = new Set(meaningfulTokens(`${vocabItem[0]} ${vocabItem[4]}`));
      const phraseIndexes = contentIndexes(scene, "phrases");
      const scored = phraseIndexes.map(index => {
        const phrase = scene.phrases[index];
        const phraseTokens = meaningfulTokens(`${phrase[1]} ${phrase[2]}`);
        const score = phraseTokens.filter(token => tokens.has(token)).length;
        return { phrase, index, score };
      }).filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.index - b.index);

      if (scored.length >= 3) return scored.slice(0, 5);

      const fallback = [];
      for (let offset = 0; offset < phraseIndexes.length && fallback.length < 5; offset++) {
        const index = phraseIndexes[(vocabIndex + offset) % phraseIndexes.length];
        if (!scored.some(item => item.index === index)) {
          fallback.push({ phrase: scene.phrases[index], index, score: 0 });
        }
      }
      return [...scored, ...fallback].slice(0, 5);
    }

    }

      const scene = sceneById(sceneId);

      state.selectedListening[selectedKey] = optionIndex;
      if (optionIndex === scene.listening[questionIndex][3]) {
        addUnique("completedListeningIds", id);
        if (source === "review") {
          removeItem("wrongQuestionIds", id);
        }
      } else {
        addUnique("wrongQuestionIds", id);
      }
      saveProgress();
      render();
    }

                ${state.showZh && currentZh ? `<div class="zh">${currentZh}</div>` : ""}
                <div class="module-audio-actions">
                  <button class="module-audio-button" onclick="speak('${escapeQuote(current[0])}')" aria-label="播放对话题目">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
                  <button class="module-audio-button" onclick="speak('${escapeQuote(current[0])}', 0.55)" aria-label="慢速播放对话题目">${lineIcon(`<path d="M20 11a8 8 0 1 1-2.3-5.7"/><path d="M20 4v7h-7"/>`)}</button>
                </div>
              </article>
              ${state.chatMode === "choice" ? `
                <div class="chat-choice-list">
                  ${current[1].map((choice, index) => `
                    <div class="chat-choice-row">
                      <button class="chat-choice-button" onclick="chooseGlobalChat(${index})">${choice}</button>
                      <button class="chat-icon-button" onclick="speak('${escapeQuote(choice)}')" aria-label="播放选项 ${index + 1}">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
                    </div>
                  `).join("")}
                  ${state.chatFeedback ? `<div class="learning-feedback ${state.chatFeedback.type}">${state.chatFeedback.text}</div>` : ""}
                </div>
              ` : `
                <div class="free-answer">
                  <textarea id="freeAnswer" placeholder="输入英文回答，例如：${escapeHtml(current[1][current[2]])}" oninput="state.freeAnswer = this.value">${escapeHtml(state.freeAnswer || "")}</textarea>
                  <div class="chat-free-actions">
                    <button class="chat-submit-button" onclick="submitFreeGlobalChat()">${lineIcon(`<path d="m4 12 15-7-4 14-3-5-5-2 12-7"/>`)} 发送并检查</button>
                    <button class="chat-secondary-button" onclick="useGlobalStandardAnswer()">使用标准答案</button>
                    <button class="chat-secondary-button" onclick="startPronunciationCheck('${escapeQuote(current[1][current[2]])}', 'global_chat_${state.chatIndex}')">检测标准回答</button>
                  </div>
                  ${state.chatFeedback ? `<div class="learning-feedback ${state.chatFeedback.type}">${state.chatFeedback.text}</div>` : ""}
                  ${speechFeedbackHtml(`global_chat_${state.chatIndex}`)}
                </div>
              `}
            `}
          </div>
        </section>
      `;
    }

    function renderChat(scene) {
      if (!state.chatHistory.length || state.chatSceneId !== scene.id) {
        state.chatHistory = [];
        state.chatIndex = 0;
        state.chatSceneId = scene.id;
      }
      const chat = coreChatTurns(scene);
      const current = chat[state.chatIndex];
      const done = state.chatIndex >= chat.length;
      const currentZh = current ? chatPromptZh(current) : "";
      return `
        <div class="chat-page-header">
          <div class="chat-page-title">
            <h2>模拟聊天</h2>
            <span>${done ? "已完成" : `${state.chatIndex + 1}/${chat.length}`}</span>
          </div>
          <div class="chat-controls">
            <div class="chat-mode" role="group" aria-label="对话模式">
              <button class="mode-btn ${state.chatMode === "free" ? "active" : ""}" onclick="setChatMode('free')">自由输入</button>
              <button class="mode-btn ${state.chatMode === "choice" ? "active" : ""}" onclick="setChatMode('choice')">选项练习</button>
            </div>
            <button class="chat-text-toggle ${state.showZh ? "active" : ""}" onclick="toggleChatZh()" aria-pressed="${state.showZh}">${state.showZh ? "中文开" : "中文"}</button>
            <button class="chat-icon-button" onclick="resetChat('${scene.id}')" aria-label="重新练习" title="重新练习">${lineIcon(`<path d="M20 6v5h-5"/><path d="M18 9a8 8 0 1 0 1 7"/>`)}</button>
          </div>
        </div>
        <div class="chat">
          ${state.chatHistory.map(turn => `
            <div class="bubble ${turn.role}">
              ${turn.en}
              ${state.showZh && turn.zh ? `<small>${turn.zh}</small>` : ""}
              <button class="bubble-play" onclick="speak('${escapeQuote(turn.en)}')" aria-label="播放这句话">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
            </div>
          `).join("")}
          ${done ? `
            <article class="chat-prompt-card">
              <div class="learning-status">${lineIcon(`<circle cx="12" cy="12" r="8"/><path d="m8.5 12 2.2 2.2 4.8-5"/>`)} 本轮完成</div>
              <div class="en">你已完成 ${scene.title} 场景对话</div>
              <div class="chat-free-actions">
                <button class="chat-submit-button" onclick="resetChat('${scene.id}')">再练一次</button>
                <button class="chat-secondary-button" onclick="setView('scene', { sceneId: '${scene.id}', module: 'phrases' })">复习短句</button>
                <button class="chat-secondary-button" onclick="setView('scene', { sceneId: '${scene.id}', module: 'speaking' })">继续跟读</button>
              </div>
            </article>
          ` : `
            <article class="chat-prompt-card">
              <div class="en">${current[0]}</div>
              ${state.showZh && currentZh ? `<div class="zh">${currentZh}</div>` : ""}
              <div class="module-audio-actions">
                <button class="module-audio-button" onclick="speak('${escapeQuote(current[0])}')" aria-label="播放对话题目" title="播放">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
                <button class="module-audio-button" onclick="speak('${escapeQuote(current[0])}', 0.55)" aria-label="慢速播放对话题目" title="慢速播放">${lineIcon(`<path d="M20 11a8 8 0 1 1-2.3-5.7"/><path d="M20 4v7h-7"/>`)}</button>
              </div>
            </article>
            ${state.chatMode === "choice" ? `
              <div class="chat-choice-list">
                ${current[1].map((choice, index) => `
                  <div class="chat-choice-row">
                    <button class="chat-choice-button" onclick="chooseChat('${scene.id}', ${index})">${choice}</button>
                    <button class="chat-icon-button" onclick="speak('${escapeQuote(choice)}')" aria-label="播放选项 ${index + 1}">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
                  </div>
                `).join("")}
                ${state.chatFeedback ? `<div class="learning-feedback ${state.chatFeedback.type}">${state.chatFeedback.text}</div>` : ""}
              </div>
            ` : `
              <div class="free-answer">
                <textarea id="freeAnswer" placeholder="输入英文回答，例如：${escapeHtml(current[1][current[2]])}" oninput="state.freeAnswer = this.value">${escapeHtml(state.freeAnswer || "")}</textarea>
                <div class="chat-free-actions">
                  <button class="chat-submit-button" onclick="submitFreeChat('${scene.id}')">${lineIcon(`<path d="m4 12 15-7-4 14-3-5-5-2 12-7"/>`)} 发送并检查</button>
                  <button class="chat-secondary-button" onclick="useStandardAnswer('${scene.id}')">使用标准答案</button>
                  <button class="chat-secondary-button" onclick="startPronunciationCheck('${escapeQuote(current[1][current[2]])}', 'chat_${scene.id}_${state.chatIndex}')">检测标准回答</button>
                </div>
                ${state.chatFeedback ? `<div class="learning-feedback ${state.chatFeedback.type}">${state.chatFeedback.text}</div>` : ""}
                ${speechFeedbackHtml(`chat_${scene.id}_${state.chatIndex}`)}
              </div>
            `}
          `}
        </div>
      `;
    }

    function setChatMode(mode) {
      state.chatMode = mode;
      state.chatFeedback = "";
      state.freeAnswer = "";
      render();
    }

    function currentGlobalChatTurn() {
      return globalChatTurns()[state.chatIndex]?.turn;
    }

    function chooseGlobalChat(choiceIndex) {
      const current = currentGlobalChatTurn();
      if (!current) return;
      const choice = current[1][choiceIndex];
      if (choiceIndex === current[2]) {
        state.chatHistory.push({ role: "system", en: current[0], zh: chatPromptZh(current) });
        state.chatHistory.push({ role: "user", en: choice, zh: chatChoiceZh(current, choiceIndex) || current[3] });
        state.chatIndex += 1;
        state.chatFeedback = "";
      } else {
        const expected = current[1][current[2]];
        state.chatFeedback = {
          type: "warn",
          text: `这句不适合当前问答。正确回答：${expected}。${current[3]}`
        };
      }
      render();
    }

    function submitFreeGlobalChat() {
      const current = currentGlobalChatTurn();
      if (!current) return;
      const expected = current[1][current[2]];
      const input = state.freeAnswer.trim();
      const score = answerScore(input, expected);

      if (!input) {
        state.chatFeedback = { type: "warn", text: `先试着自己写一句英文。标准回答可以是：${expected}` };
        render();
        return;
      }

      if (score >= 0.6) {
        state.chatHistory.push({ role: "system", en: current[0], zh: chatPromptZh(current) });
        state.chatHistory.push({ role: "user", en: input, zh: chatTranslation(input) || chatChoiceZh(current, current[2]) });
        state.chatIndex += 1;
        state.freeAnswer = "";
        state.chatFeedback = "";
      } else {
        state.chatFeedback = {
          type: "warn",
          text: `这句还不够贴近当前问答。你写的是：${input}。正确回答：${expected}。${current[3]}`
        };
      }
      render();
    }

    function useGlobalStandardAnswer() {
      const current = currentGlobalChatTurn();
      if (!current) return;
      state.freeAnswer = current[1][current[2]];
      state.chatFeedback = { type: "good", text: "已填入标准回答。你可以先读一遍，再发送进入下一轮。" };
      render();
    }

    function chooseChat(sceneId, choiceIndex) {
      const scene = sceneById(sceneId);
      const chat = coreChatTurns(scene);
      const current = chat[state.chatIndex];
      const choice = current[1][choiceIndex];
      if (choiceIndex === current[2]) {
        state.chatHistory.push({ role: "system", en: current[0], zh: chatPromptZh(current) });
        state.chatHistory.push({ role: "user", en: choice, zh: chatChoiceZh(current, choiceIndex) || current[3] });
        state.chatIndex += 1;
        state.chatFeedback = "";
        if (state.chatIndex >= chat.length) {
          addUnique("completedChatIds", chatId(scene));
        }
      } else {
        const expected = current[1][current[2]];
        state.chatFeedback = {
          type: "warn",
          text: `这句不适合当前场景。正确回答：${expected}。${current[3]}`
        };
      }
      render();
    }

    function submitFreeChat(sceneId) {
      const scene = sceneById(sceneId);
      const chat = coreChatTurns(scene);
      const current = chat[state.chatIndex];
      const expected = current[1][current[2]];
      const input = state.freeAnswer.trim();
      const score = answerScore(input, expected);

      if (!input) {
        state.chatFeedback = { type: "warn", text: `先试着自己写一句英文。标准回答可以是：${expected}` };
        render();
        return;
      }

      if (score >= 0.6) {
        state.chatHistory.push({ role: "system", en: current[0], zh: chatPromptZh(current) });
        state.chatHistory.push({ role: "user", en: input, zh: chatTranslation(input) || chatChoiceZh(current, current[2]) });
        state.chatIndex += 1;
        state.freeAnswer = "";
        state.chatFeedback = "";
        if (state.chatIndex >= chat.length) {
          addUnique("completedChatIds", chatId(scene));
        }
      } else {
        state.chatFeedback = {
          type: "warn",
          text: `这句还不够贴近当前场景。你写的是：${input}。正确回答：${expected}。${current[3]}`
        };
      }
      render();
    }

    function useStandardAnswer(sceneId) {
      const scene = sceneById(sceneId);
      const current = coreChatTurns(scene)[state.chatIndex];
      state.freeAnswer = current[1][current[2]];
      state.chatFeedback = { type: "good", text: "已填入标准回答。你可以先读一遍，再发送进入下一轮。" };
      render();
    }

    function toggleChatZh() {
      state.showZh = !state.showZh;
      render();
    }

    function resetChat(sceneId) {
      state.chatSceneId = sceneId;
      state.chatIndex = 0;
      state.chatHistory = [];
      state.chatFeedback = "";
      state.freeAnswer = "";
      render();
    }

    function resetGlobalChat() {
      state.chatSceneId = "global";
      state.chatIndex = 0;
      state.chatHistory = [];
      state.chatFeedback = "";
      state.freeAnswer = "";
      render();
    }

    function renderFavorites() {
      const favoriteItems = state.progress.favoriteIds.map(id => findFavorite(id)).filter(Boolean);
      const wrongItems = state.progress.wrongQuestionIds.map(id => findWrongQuestion(id)).filter(Boolean);
      app.innerHTML = `
        <header class="review-titlebar"><h1>复习</h1><span>${favoriteItems.length + wrongItems.length} 条待复习</span></header>
        <section class="section">
          <div class="section-title">
            <h2>收藏内容</h2>
            <span>${favoriteItems.length} 条</span>
          </div>
          ${favoriteItems.length ? `
            <div class="review-list">
              ${favoriteItems.map(item => `
                <article class="review-card">
                  <div class="review-card-meta"><span>${item.sceneTitle}</span><span>${item.type === "vocabulary" ? "词汇" : "短句"}</span></div>
                  <div class="en">${item.en}</div>
                  ${item.ipa ? `<div class="ipa">${item.ipa}</div>` : ""}
                  <div class="zh">${item.zh}</div>
                  ${item.example ? `<div class="review-example"><strong>例句</strong><span>${item.example}</span>${item.exampleZh ? `<small>${item.exampleZh}</small>` : ""}</div>` : ""}
                  <div class="review-card-actions">
                    <button class="module-audio-button" onclick="speak('${escapeQuote(item.en)}')" aria-label="播放">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
                    <button class="module-audio-button" onclick="speak('${escapeQuote(item.en)}', 0.55)" aria-label="慢速播放">${lineIcon(`<path d="M20 11a8 8 0 1 1-2.3-5.7"/><path d="M20 4v7h-7"/>`)}</button>
                    <button class="review-remove-button" onclick="toggleFavorite('${item.id}')">取消收藏</button>
                  </div>
                </article>
              `).join("")}
            </div>
          ` : `<div class="empty">还没有收藏内容。学习短句或词汇时点收藏，就能在这里复习。</div>`}
        </section>
        <section class="section">
          <div class="section-title">
            <h2>听力错题</h2>
            <span>${wrongItems.length} 题</span>
          </div>
          ${wrongItems.length ? `
            <div class="review-list">
              ${wrongItems.map(item => `
                <article class="review-question-card">
                  <div class="review-card-meta"><span>${item.sceneTitle}</span><span>错题练习</span></div>
                  <h3>${item.question}</h3>
                  <div class="module-audio-actions">
                    <button class="module-audio-button" onclick="speak('${escapeQuote(item.en)}')" aria-label="播放错题">${lineIcon(`<path d="M11 5 6.5 9H3v6h3.5l4.5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/>`)}</button>
                    <button class="module-audio-button" onclick="speak('${escapeQuote(item.en)}', 0.55)" aria-label="慢速播放错题">${lineIcon(`<path d="M20 11a8 8 0 1 1-2.3-5.7"/><path d="M20 4v7h-7"/>`)}</button>
                  </div>
                  <div class="review-options">${item.options.map((option, optionIndex) => {
                    const selected = state.selectedListening[`review_${item.id}`];
                    const className = selected === undefined ? "" : optionIndex === item.answer ? "correct" : selected === optionIndex ? "wrong" : "";
                    const icon = className === "correct" ? lineIcon(`<circle cx="12" cy="12" r="8"/><path d="m8.5 12 2.2 2.2 4.8-5"/>`) : className === "wrong" ? lineIcon(`<circle cx="12" cy="12" r="8"/><path d="m9 9 6 6M15 9l-6 6"/>`) : "";
                    return `<button class="listening-choice ${className}" onclick="selectListening('${item.sceneId}', ${item.index}, ${optionIndex}, 'review')"><span class="choice-letter">${String.fromCharCode(65 + optionIndex)}</span><span>${option}</span><span class="choice-state-icon">${icon}</span></button>`;
                  }).join("")}</div>
                  ${state.selectedListening[`review_${item.id}`] !== undefined ? `<div class="learning-feedback ${state.selectedListening[`review_${item.id}`] === item.answer ? "good" : "warn"}">${state.selectedListening[`review_${item.id}`] === item.answer ? "回答正确，已从错题本移除。" : `正确答案：${item.options[item.answer]}。${item.explanation}`}</div>` : ""}
                </article>
              `).join("")}
            </div>
          ` : `<div class="empty">目前没有听力错题。做听力练习时，答错的题会自动出现在这里。</div>`}
        </section>
        ${bottomNav("favorites")}
      `;
    }

    function findFavorite(id) {
      for (const scene of SCENES) {
        for (let index = 0; index < scene.vocab.length; index++) {
          if (vocabId(scene, index) === id) {
            const item = scene.vocab[index];
            return { id, type: "vocabulary", sceneTitle: scene.title, en: item[0], ipa: item[1], zh: item[2], example: item[4], exampleZh: item[5] };
          }
        }
        for (let index = 0; index < scene.phrases.length; index++) {
          if (phraseId(scene, index) === id) {
            const item = scene.phrases[index];
            return { id, type: "phrase", sceneTitle: scene.title, en: item[1], zh: item[0], note: item[2] };
          }
        }
      }
      return null;
    }

  function findWrongQuestion(id) {
      for (const scene of SCENES) {
        for (let index = 0; index < scene.listening.length; index++) {
          if (listeningId(scene, index) === id) {
            const item = scene.listening[index];
            return {
              id,
              index,
              sceneId: scene.id,
              sceneTitle: scene.title,
              en: item[0],
              question: item[1],
              options: item[2],
              answer: item[3],
              explanation: item[4]
            };
          }
        }
      }
      return null;
    }

    function escapeQuote(text) {
      return String(text).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    document.addEventListener("keydown", event => {
      if (event.key !== "Escape") return;
      if (state.noticeDialog) {
        closeNoticeDialog();
      } else if (state.showVocabExitConfirm) {
        cancelVocabStudyExit();
      }
    });

    render();
  </script>
</body>
</html>
